# dumpsys_activity.conf
# GRC configuration for "adb shell dumpsys activity activities" output.
# 사용법: adb shell dumpsys activity activities | grcat /path/to/dumpsys_activity.conf
#
# 이 구성 파일은 dumpsys activity activities의 출력에서
# 헤더, Task, ActivityRecord, ProcessRecord, Intent, 상태 정보 등
# 주요 패턴에 대해 색상과 스타일을 지정합니다.
======
# 1. 전체 헤더: "ACTIVITY MANAGER ACTIVITIES (dumpsys activity activities)"
regexp=^ACTIVITY\s+MANAGER\s+ACTIVITIES.*$
colours=bold bright_yellow
======
# 2. Display 관련 헤더 (예: "Display #0 (activities from top to bottom):")
regexp=^Display\s+#\d+.*$
colours=bold bright_blue
======
# 3. 별표(*)로 시작하는 Task 라인
regexp=^\s*\*\s+Task\{[^}]+\}$
colours=bold bright_green
======
# 4. 들여쓰기된 Task 라인 (별표 없이 Task가 시작되는 경우)
regexp=^\s*Task\{[^}]+\}$
colours=bright_green
======
# 5. ActivityRecord 항목 (액티비티 정보)
regexp=ActivityRecord\{[^}]+\}
colours=bright_cyan
======
# 6. ProcessRecord 항목 (프로세스 정보)
regexp=ProcessRecord\{[^}]+\}
colours=bright_cyan
======
# 7. Intent 정보 (액션, 플래그, 컴포넌트 등)
regexp=Intent\s+\{[^}]+\}
colours=bold magenta
======
# 8. packageName 키워드
regexp=packageName=
colours=cyan
======
# 9. processName 키워드
regexp=processName=
colours=cyan
======
# 10. launchedFrom 관련 정보
regexp=launchedFromUid=
colours=yellow
======
regexp=launchedFromPackage=
colours=yellow
======
# 11. 상태(state) 정보: RESUMED, PAUSED, STOPPED, FINISHING, RUNNING 등
regexp=\bstate=(RESUMED|PAUSED|STOPPED|FINISHING|RUNNING)\b
colours=bold red
======
# 12. lastLaunchTime 정보
regexp=lastLaunchTime=
colours=bright_magenta
======
# 13. mActivityComponent 정보
regexp=mActivityComponent=
colours=bright_blue
======
# 14. taskDescription 관련 정보 (라벨, 색상 등)
regexp=taskDescription:
colours=bold blue
======
# 15. mLastReportedConfigurations 섹션
regexp=^\s*mLastReportedConfigurations:
colours=bold green
======
# 16. mOverrideConfig 섹션
regexp=^\s*mOverrideConfig:
colours=green
======
# 17. CurrentConfiguration 섹션
regexp=^\s*CurrentConfiguration:
colours=green
======
# 18. configChanges 정보
regexp=configChanges=
colours=bold cyan
======
# 19. visible 및 translucent 속성
regexp=visible=|nowVisible
colours=bright_green
======
regexp=translucent=
colours=bright_red
======
# 20. "Resumed:"로 시작하는 라인 (최근 액티비티 정보)
regexp=^\s*Resumed:
colours=bold bright_magenta
======
# 21. ActivityTaskSupervisor 상태 헤더
regexp=^ActivityTaskSupervisor state:$
colours=bold underline,bright_yellow
======
# 22. DisplayPolicy 섹션 헤더
regexp=^DisplayPolicy.*$
colours=bold,underline bright_blue
======
# 23. WindowInsetsStateController 섹션 헤더
regexp=^WindowInsetsStateController.*$
colours=bold,underline bright_blue
======
# 24. Keyguard 관련 정보
regexp=^.*KeyguardController.*$
colours=bold red
======
# 25. TaskDisplayArea 관련 항목
regexp=^\s*TaskDisplayArea
colours=bold blue
======
# 25. TaskDisplayArea 관련 항목
regexp=\s+(\w+)TaskDisplayArea$
colours=bold red
======
# 26. PinnedTaskController 항목
regexp=PinnedTaskController
colours=bold magenta
======
# 27. 화면 크기 등 숫자 패턴 (예: "1920x1080")
regexp=\b\d{3,4}x\d{3,4}\b
colours=bright_cyan
======
# 28. mOccludesParent 관련 정보
regexp=mOccludesParent=
colours=yellow
======
# 29. mImeInsetsFrozenUntilStartInput 관련 정보
regexp=mImeInsetsFrozenUntilStartInput=
colours=yellow
======
# 30. overrideOrientation 및 requestedOrientation 정보
regexp=overrideOrientation=
colours=bold blue
======
regexp=requestedOrientation=
colours=bold blue
======
# End of configuration.
